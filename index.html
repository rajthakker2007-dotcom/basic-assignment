<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Feedback Form</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  padding: 40px;
}

.container {
  width: 400px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #22c55e;
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

.success {
  color: #22c55e;
  margin-top: 10px;
  display: none;
}

.search-box {
  margin-top: 25px;
  display: flex;
  gap: 10px;
  width: 100%;
}

/* 🚀 FIXED INPUT */
.search-box input {
  flex: 1;              /* 🔥 THIS WAS MISSING */
  width: 100%;          /* 🔥 force full width */
  padding: 14px;
  font-size: 16px;
  border-radius: 10px;
  border: none;

  background: #000000;  /* ✅ WHITE BG */
  color: #000000;          /* ✅ BLACK TEXT */

  min-width: 200px;     /* 🔥 prevent collapse */
}

/* placeholder */
.search-box input::placeholder {
  color: #666;
}

/* button */
.search-box button {
  padding: 14px 20px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
  cursor: pointer;
}

/* focus */
.search-box input:focus {
  outline: none;
  box-shadow: 0 0 0 2px #22c55e;
}
.data-card {
  background: #1e293b;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🚀 Feedback Form</h2>

<div class="card">
<form id="feedback-form">

<input name="firstName" placeholder="First Name" required>
<input name="lastName" placeholder="Last Name">
<input name="email" type="email" placeholder="Email" required>

<select name="category">
  <option value="">Select Category</option>
  <option value="Support">Support</option>
  <option value="Bug">Bug</option>
</select>

<input name="rating" placeholder="Rating (1-5)">
<textarea name="feedback" placeholder="Your feedback"></textarea>

<button type="submit">Send Feedback 🚀</button>

</form>

<div class="success" id="success-msg">✅ Submitted successfully!</div>
</div>

<!-- SEARCH -->

<div class="search-box">
  <input type="text" id="searchName" placeholder="Search by name..." />
  <button onclick="searchUser()">Search 🔍</button>
</div>

<h3>📊 Submitted Feedback</h3>
<div id="data-list"></div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyozsBeoYQ3YJM2iH6n3Eh3iac0dDTTPDmZHXUtQZuo9FOIPKnMG-wo-YaBmz5z5iC8/exec";

const form = document.getElementById("feedback-form");
const successMsg = document.getElementById("success-msg");

// SUBMIT FORM
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(form);
  const payload = Object.fromEntries(formData.entries());

  try {
    await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify(payload),
    });

    successMsg.style.display = "block";
    form.reset();
    loadData();

  } catch (err) {
    console.error(err);
    alert("Error submitting ❌");
  }
});

// LOAD ALL DATA
async function loadData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    displayData(data.reverse());

  } catch (err) {
    console.error(err);
  }
}

// SEARCH USER
async function searchUser() {
  const name = document.getElementById("searchName").value.trim();
  const container = document.getElementById("data-container");

  container.innerHTML = "";

  if (!name) {
    container.innerHTML = "<p style='color:red;'>Enter a name</p>";
    return;
  }

  try {
    const res = await fetch(`${API_URL}?name=${name}`);
    const data = await res.json();

    console.log("DATA:", data); // 🔥 check this in console

    if (data.length === 0) {
      container.innerHTML = "<p style='color:red;'>❌ No user found</p>";
      return;
    }

    data.forEach(item => {
      container.innerHTML += `
        <div class="data-card">
          <h3>${item.firstName} ${item.lastName}</h3>
          <p>📧 ${item.email}</p>
          <p>📂 ${item.category} | ⭐ ${item.rating}</p>
          <p>💬 ${item.feedback}</p>
        </div>
      `;
    });

  } catch (err) {
    console.error(err);
    container.innerHTML = "<p style='color:red;'>Error fetching data</p>";
  }
}

// DISPLAY FUNCTION
function displayData(data) {
  const container = document.getElementById("data-list");
  container.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "data-card";

    div.innerHTML = `
      <strong>${item.firstName} ${item.lastName}</strong><br>
      📧 ${item.email}<br>
      🏷 ${item.category} | ⭐ ${item.rating}<br>
      💬 ${item.feedback}
    `;

    container.appendChild(div);
  });
}

// LOAD DATA ON START

</script>

</body>
</html>
