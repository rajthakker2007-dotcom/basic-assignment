<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Feedback Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      padding: 30px;
      border-radius: 16px;
      width: 350px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 600;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    input::placeholder,
    textarea::placeholder {
      color: #cbd5e1;
    }

    select {
      color: white;
    }

    textarea {
      resize: none;
      height: 80px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #22c55e, #06b6d4);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.03);
      opacity: 0.9;
    }

    .success {
      display: none;
      text-align: center;
      margin-top: 10px;
      color: #22c55e;
      font-weight: 500;
    }

  </style>
</head>

<body>

  <div class="card">
    <h2>💬 Feedback</h2>

    <form id="feedback-form">
      <input name="firstName" placeholder="First Name" required>
      <input name="lastName" placeholder="Last Name">

      <input name="email" type="email" placeholder="Email" required>

      <select name="category">
        <option value="">Select Category</option>
        <option value="support">support</option>
        <option value="bug">bug</option>
      </select>

      <input name="rating" placeholder="Rating (1-5)">

      <textarea name="feedback" placeholder="Your feedback"></textarea>

      <button type="submit">Send Feedback 🚀</button>
    </form>

    <div class="success" id="success-msg">
      ✅ Submitted successfully!
    </div>
  </div>

  <script>
    const form = document.getElementById("feedback-form");
    const successMsg = document.getElementById("success-msg");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const payload = {
        firstName: form.firstName.value,
        lastName: form.lastName.value,
        email: form.email.value,
        category: form.category.value,
        rating: form.rating.value,
        feedback: form.feedback.value
      };

      try {
        const res = await fetch("https://script.google.com/macros/s/AKfycbxIOqTeuq4pSpqTa9mgz-mC_UvHQn23nqGGK0d9cTLMNJFzUHorsMgueI2lLJvZAS92wA/exec", {
          method: "POST",
          headers: {
            "Content-Type": "text/plain"
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (data.result === "success") {
          form.reset();
          successMsg.style.display = "block";
        }

      } catch (err) {
        alert("Error submitting form");
        console.error(err);
      }
    });
  </script>

</body>
</html>
