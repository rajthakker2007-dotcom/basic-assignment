<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feedback Form</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  text-align: center;
}

/* CARD */
.card {
  width: 350px;
  margin: 40px auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
}

/* FORM */
form {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

input, select, textarea {
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
}

button {
  transition: all 0.3s ease;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #22c55e;
}

button:active {
  transform: scale(0.95);
}

/* SEARCH */
.search-box {
  width: 350px;
  margin: 20px auto;
  display: flex;
  gap: 10px;
}

.search-box input {
  background: #0f172a;
  color: white;
  transition: all 0.3s ease;
}

.search-box input:focus {
  box-shadow: 0 0 10px #22c55e;
  transform: scale(1.03);
}

.search-box input::placeholder {
  color: #aaa;
}

/* DATA */
#data-list {
  width: 350px;
  margin: 10px auto;
}

@keyframes fadeSlideUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.data-card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-top: 15px;
  border: 1px solid #334155;
  animation: fadeSlideUp 0.4s ease;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.data-card:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 10px 25px rgba(34, 197, 94, 0.2);
}
</style>
</head>

<body>

<div class="card">
  <h2>🚀 Feedback Form</h2>

<form id="feedback-form">
  <input name="firstName" placeholder="First Name" required>
  <input name="lastName" placeholder="Last Name" required>
  <input name="email" placeholder="Email" required>

  <select name="category">
    <option>Support</option>
    <option>Bug</option>
  </select>

  <input name="rating" placeholder="Rating">
  <textarea name="feedback" placeholder="Feedback"></textarea>

  <button type="submit">Send Feedback 🚀</button>
</form>

  <p id="success-msg"></p>
</div>

<!-- SEARCH -->
<div class="search-box">
  <input type="text" id="searchName" placeholder="Search by name...">
  <button onclick="searchUser()">Search 🔍</button>
</div>

<h3>📊 Submitted Feedback</h3>

<div id="data-list"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxdPy4FQzJQwAjlGn_biwsDu5DLUo8rWSOLhEhSZq0bNNkT_9vojPrLcAKZvkM0XzA9Dg/exec";

const form = document.getElementById("feedback-form");
const successMsg = document.getElementById("success-msg");
const dataList = document.getElementById("data-list");

/* SUBMIT FORM */
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(form);

  console.log("Sending data..."); // debug

  try {
    await fetch(API_URL, {
      method: "POST",
      mode: "no-cors",
      body: formData
    });

    console.log("Sent ✅");
    alert("Submitted successfully!");

    form.reset();

  } catch (err) {
    console.error("Error:", err);
  }
});

/* SEARCH USER */
async function searchUser() {
  const name = document.getElementById("searchName").value;
  const container = document.getElementById("data-list");

  console.log("Searching:", name);

  const res = await fetch(API_URL + "?name=" + name);
  const data = await res.json();

  container.innerHTML = ""; // 🔥 CLEAR OLD DATA

  if (data.length === 0) {
    container.innerHTML = "❌ No user found";
    return;
  }

  data.forEach(item => {
    const card = `
      <div class="data-card">
        <h3>${item.firstName} ${item.lastName}</h3>
        <p>📧 ${item.email}</p>
        <p>📂 ${item.category} | ⭐ ${item.rating}</p>
        <p>💬 ${item.feedback}</p>
      </div>
    `;
    container.innerHTML += card;
  });
}
</script>

</body>
</html>
