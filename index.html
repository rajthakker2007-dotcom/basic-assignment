<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feedback Form</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  text-align: center;
}

/* CARD */
.card {
  width: 350px;
  margin: 40px auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
}

/* FORM */
form {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

input, select, textarea {
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
}

button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* SEARCH */
.search-box {
  width: 350px;
  margin: 20px auto;
  display: flex;
  gap: 10px;
}

.search-box input {
  flex: 1;
  background: #111827;
  color: white;
}

.search-box input::placeholder {
  color: #aaa;
}

/* DATA */
#data-list {
  width: 350px;
  margin: 10px auto;
}

/* CARDS */
.data-card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 12px;
  text-align: left;
}
</style>
</head>

<body>

<div class="card">
  <h2>🚀 Feedback Form</h2>

  <form id="feedback-form">
    <input name="firstName" placeholder="First Name" required>
    <input name="lastName" placeholder="Last Name">
    <input name="email" type="email" placeholder="Email" required>

    <select name="category">
      <option value="">Select Category</option>
      <option value="Support">Support</option>
      <option value="Bug">Bug</option>
    </select>

    <input name="rating" placeholder="Rating (1-5)">
    <textarea name="feedback" placeholder="Your feedback"></textarea>

    <button type="submit">Send Feedback 🚀</button>
  </form>

  <p id="success-msg"></p>
</div>

<!-- SEARCH -->
<div class="search-box">
  <input type="text" id="searchName" placeholder="Search by name...">
  <button onclick="searchUser()">Search 🔍</button>
</div>

<h3>📊 Submitted Feedback</h3>

<div id="data-list"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyozsBeoYQ3YJM2iH6n3Eh3iac0dDTTPDmZHXUtQZuo9FOIPKnMG-wo-YaBmz5z5iC8/exec";

const form = document.getElementById("feedback-form");
const successMsg = document.getElementById("success-msg");
const dataList = document.getElementById("data-list");

/* SUBMIT FORM */
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(form);
  const payload = Object.fromEntries(formData.entries());

await fetch(API_URL, {
  method: "POST",
  mode: "no-cors",   // 🔥 MUST ADD THIS
  body: JSON.stringify(payload)
});

  successMsg.innerText = "✅ Submitted!";
form.reset();
});

/* SEARCH USER */
async function searchUser() {
  const name = document.getElementById("searchName").value;

  if (!name) {
    alert("Enter a name!");
    return;
  }

  const res = await fetch(API_URL + "?name=" + name);
  const data = await res.json();

  dataList.innerHTML = "";

  if (data.length === 0) {
    dataList.innerHTML = "<p>❌ No user found</p>";
    return;
  }

  data.forEach(item => {
    dataList.innerHTML += `
      <div class="data-card">
        <h3>${item.firstName} ${item.lastName}</h3>
        <p>📧 ${item.email}</p>
        <p>📁 ${item.category} | ⭐ ${item.rating}</p>
        <p>💬 ${item.feedback}</p>
      </div>
    `;
  });
}
</script>

</body>
</html>
