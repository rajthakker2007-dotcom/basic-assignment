<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Feedback Form</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      width: 400px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .success {
      display: none;
      color: #22c55e;
      margin-top: 10px;
      text-align: center;
    }

    .data-card {
      background: #1e293b;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🚀 Feedback Form</h2>

  <div class="card">
    <form id="feedback-form">
      <input name="firstName" placeholder="First Name" required>
      <input name="lastName" placeholder="Last Name">

      <input name="email" type="email" placeholder="Email" required>

      <select name="category">
        <option value="">Select Category</option>
        <option value="Support">Support</option>
        <option value="Bug">Bug</option>
      </select>

      <input name="rating" placeholder="Rating (1-5)">
      <textarea name="feedback" placeholder="Your feedback"></textarea>

      <button type="submit">Send Feedback 🚀</button>
    </form>

    <div class="success" id="success-msg">
      ✅ Submitted successfully!
    </div>
  </div>

  <h3 style="margin-top:20px;">📊 Submitted Feedback</h3>
  <div id="data-container"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxIOqTeuq4pSpqTa9mgz-mC_UvHQn23nqGGK0d9cTLMNJFzUHorsMgueI2lLJvZAS92wA/exec";

const form = document.getElementById("feedback-form");
const successMsg = document.getElementById("success-msg");
const container = document.getElementById("data-container");

// 🔥 SUBMIT FORM
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(form);
  const payload = Object.fromEntries(formData.entries());

  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(payload),
    });

    successMsg.style.display = "block";
    form.reset();

    loadData(); // refresh data

  } catch (err) {
    alert("Error ❌");
    console.error(err);
  }
});

// 🔥 LOAD DATA FROM SHEET
async function loadData() {
  try {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();

    container.innerHTML = "";

    data.reverse().forEach(item => {
      container.innerHTML += `
        <div class="data-card">
          <strong>${item.firstName || ""} ${item.lastName || ""}</strong><br>
          📧 ${item.email || ""}<br>
          ⭐ ${item.rating || ""}<br>
          💬 ${item.feedback || ""}
        </div>
      `;
    });

  } catch (err) {
    console.error(err);
  }
}

// 🚀 LOAD ON START
loadData();
</script>

</body>
</html>
