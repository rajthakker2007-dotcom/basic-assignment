<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback Form</title>
</head>
<body>

  <h2>Feedback Form</h2>

  <!-- ✅ NO action / NO method -->
  <form id="feedback-form">

  <input name="firstName" placeholder="First Name" required><br><br>

  <input name="lastName" placeholder="Last Name" required><br><br>

  <input name="email" type="email" placeholder="Email" required><br><br>

  <select name="category" required>
    <option value="">Select Category</option>
    <option value="Support">Support</option>
    <option value="Bug">Bug</option>
  </select><br><br>

  <input name="rating" placeholder="Rating (1-5)"><br><br>

  <textarea name="feedback" placeholder="Your feedback"></textarea><br><br>

  <button type="submit">Submit</button>

</form>

  <script>
    const form = document.getElementById("feedback-form");
    const scriptUrl = "https://script.google.com/macros/s/AKfycbxIOqTeuq4pSpqTa9mgz-mC_UvHQn23nqGGK0d9cTLMNJFzUHorsMgueI2lLJvZAS92wA/exec";

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());
      const rating = Number.parseInt(data.rating, 10);

      if (data.rating && (!Number.isInteger(rating) || rating < 1 || rating > 5)) {
        alert("Please enter a rating from 1 to 5.");
        return;
      }

      console.log("Sending:", data);

      try {
        await fetch(scriptUrl, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify({
            ...data,
            rating: data.rating ? rating : ""
          })
        });

        alert("Submitted successfully.");
        form.reset();

      } catch (error) {
        console.error("Error:", error);
        alert("Something went wrong.");
      }
    });
  </script>

</body>
</html>
