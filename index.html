<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Feedback Form</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 500px;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

/* SEARCH BOX */
.search-box {
  display: flex;
  gap: 10px;
  margin: 25px 0;
}

.search-box input {
  flex: 1;
  padding: 14px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  background: #111827;
  color: white;
}

.search-box input::placeholder {
  color: #888;
}

.search-box button {
  padding: 14px 18px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* DATA LIST */
#data-list {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

/* CARDS */
.data-card {
  background: #1e293b;
  padding: 16px;
  border-radius: 12px;
  border: 1px solid #334155;
  transition: 0.2s;
}
.section-title {
  margin-top: 20px;
  margin-bottom: 10px;
  font-size: 18px;
  color: #e2e8f0;
}
.data-card:hover {
  border-color: #22c55e;
  transform: scale(1.02);
}

.data-card h3 {
  margin: 0 0 6px;
}

.section-title {
  margin-top: 20px;
  margin-bottom: 10px;
  font-size: 18px;
  color: #e2e8f0;
}

/* MAIN DATA BOX */
.data-container {
  background: #0f172a;
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 15px;
  margin-top: 10px;

  display: flex;
  flex-direction: column;
  gap: 15px;
}
/* EACH CARD */
.data-card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #475569;

  transition: 0.2s;
}

.data-card:hover {
  border-color: #22c55e;
  transform: scale(1.02);
}
</style>
</head>

<body>

<div class="container">

<h2>🚀 Feedback Form</h2>

<div class="card">
<form id="feedback-form">

<input name="firstName" placeholder="First Name" required>
<input name="lastName" placeholder="Last Name">
<input name="email" type="email" placeholder="Email" required>

<select name="category">
  <option value="">Select Category</option>
  <option value="Support">Support</option>
  <option value="Bug">Bug</option>
</select>

<input name="rating" placeholder="Rating (1-5)">
<textarea name="feedback" placeholder="Your feedback"></textarea>

<button type="submit">Send Feedback 🚀</button>

</form>

<div class="success" id="success-msg">✅ Submitted successfully!</div>
<div id="data-container"></div>

<!-- SEARCH -->

<div class="search-box">
  <input type="text" id="searchName" placeholder="Search by name..." />
  <button onclick="searchUser()">Search 🔍</button>
</div>

<h3 class="section-title">📊 Submitted Feedback</h3>

<div id="data-list" class="data-container"></div>

<script>


const form = document.getElementById("feedback-form");
const successMsg = document.getElementById("success-msg");

// SUBMIT FORM
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(form);
  const payload = Object.fromEntries(formData.entries());

  try {
    await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify(payload),
    });

    successMsg.style.display = "block";
    form.reset();
    loadData();

  } catch (err) {
    console.error(err);
    alert("Error submitting ❌");
  }
});

// LOAD ALL DATA
async function loadData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    displayData(data.reverse());

  } catch (err) {
    console.error(err);
  }
}

// SEARCH USER
const API_URL = "https://script.google.com/macros/s/AKfycbyozsBeoYQ3YJM2iH6n3Eh3iac0dDTTPDmZHXUtQZuo9FOIPKnMG-wo-YaBmz5z5iC8/exec";

async function searchUser() {
  const name = document.getElementById("searchName").value.trim();
  const container = document.getElementById("data-container");

  console.log("Searching for:", name);

  container.innerHTML = "";

  if (!name) {
    container.innerHTML = "<p style='color:red;'>Enter a name</p>";
    return;
  }

  const res = await fetch(`${API_URL}?name=${name}`);
  const data = await res.json();

  console.log("API DATA:", data);

  if (!data || data.length === 0) {
    container.innerHTML = "<p style='color:red;'>❌ No user found</p>";
    return;
  }

  data.forEach(item => {
    const card = `
      <div class="data-card">
        <h3>${item.firstName} ${item.lastName}</h3>
        <p>📧 ${item.email}</p>
        <p>📂 ${item.category} | ⭐ ${item.rating}</p>
        <p>💬 ${item.feedback}</p>
      </div>
    `;
    container.innerHTML += card;
  });
}

// DISPLAY FUNCTION
function displayData(data) {
  const container = document.getElementById("data-list");
  container.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "data-card";

    div.innerHTML = `
      <strong>${item.firstName} ${item.lastName}</strong><br>
      📧 ${item.email}<br>
      🏷 ${item.category} | ⭐ ${item.rating}<br>
      💬 ${item.feedback}
    `;

    container.appendChild(div);
  });
}

// LOAD DATA ON START

</script>

</body>
</html>
