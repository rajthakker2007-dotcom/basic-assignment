<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Feedback Form</title>
</head>
<body>

  <h2>Feedback Form</h2>

  <!-- ✅ NO action / NO method -->
  <form id="feedback-form">
    <input type="text" name="firstName" placeholder="First Name" required><br><br>
    <input type="text" name="lastName" placeholder="Last Name" required><br><br>
    <input type="email" name="email" placeholder="Email" required><br><br>

    <select name="category" required>
      <option value="">Select Category</option>
      <option value="Support">Support</option>
      <option value="Bug">Bug</option>
      <option value="Feedback">Feedback</option>
    </select><br><br>

    <input type="number" name="rating" placeholder="Rating (1-5)" required><br><br>

    <textarea name="feedback" placeholder="Your feedback" required></textarea><br><br>

    <button type="submit">Submit</button>
  </form>

  <script>
    const form = document.getElementById("feedback-form");

    form.addEventListener("submit", async function (e) {
      e.preventDefault(); // 🔥 STOP PAGE RELOAD

      const data = {
        firstName: form.firstName.value,
        lastName: form.lastName.value,
        email: form.email.value,
        category: form.category.value,
        rating: form.rating.value,
        feedback: form.feedback.value
      };

      console.log("Sending:", data);

      try {
        await fetch("https://script.google.com/macros/s/AKfycbxIOqTeuq4pSpqTa9mgz-mC_UvHQn23nqGGK0d9cTLMNJFzUHorsMgueI2lLJvZAS92wA/exec", {
          method: "POST",
          mode: "no-cors", // 🔥 REQUIRED
          body: JSON.stringify(data)
        });

        alert("Submitted successfully 🚀");
        form.reset();

      } catch (error) {
        console.error("Error:", error);
        alert("Something went wrong ❌");
      }
    });
  </script>

</body>
</html>
